<title>Amy | TypeLabs</title>
<meta name="description" content="Amy is Ryan Hooks' Chief Agentic Officer at TypeLabs. Chat, build, execute, monetize.">

<style>
/* ===== CONFIG ===== */
:root {
  --api-url: /execute; /* Change this to point at any backend */

  --color-bg: #0a0a0a;
  --color-surface: #111111;
  --color-surface-2: #161616;
  --color-surface-3: #1c1c1c;
  --color-border: #222222;
  --color-border-hover: #333333;

  --color-text: #f0f0f0;
  --color-text-muted: #888888;
  --color-text-faint: #555555;

  --color-accent: #00e5cc;
  --color-accent-dim: #00b8a3;
  --color-accent-glow: rgba(0, 229, 204, 0.12);
  --color-accent-glow-strong: rgba(0, 229, 204, 0.25);

  --color-system: #ffaa00;
  --color-system-bg: rgba(255, 170, 0, 0.06);
  --color-system-border: rgba(255, 170, 0, 0.15);

  --color-error: #ef4444;
  --color-error-bg: rgba(239, 68, 68, 0.06);
  --color-error-border: rgba(239, 68, 68, 0.15);

  --font-body: 'Satoshi', -apple-system, BlinkMacSystemFont, sans-serif;

  --text-xs: 0.75rem;
  --text-sm: 0.875rem;
  --text-base: 1rem;

  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-6: 1.5rem;
  --space-8: 2rem;

  --radius-sm: 0.375rem;
  --radius-md: 0.5rem;
  --radius-lg: 0.75rem;
  --radius-full: 9999px;

  --transition-fast: 150ms cubic-bezier(0.16, 1, 0.3, 1);
  --transition-medium: 250ms cubic-bezier(0.16, 1, 0.3, 1);
}

/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  height: 100dvh;
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--color-text);
  background: var(--color-bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
input, textarea { font: inherit; color: inherit; }

::selection {
  background: var(--color-accent-glow-strong);
  color: var(--color-text);
}

/* ===== HEADER ===== */
.app-header {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-4) var(--space-6);
  border-bottom: 1px solid var(--color-border);
  flex-shrink: 0;
}

.header-identity {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: var(--radius-full);
  background: var(--color-accent);
  animation: pulse 2.5s ease-in-out infinite;
  flex-shrink: 0;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.avatar-sm {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-full);
  border: 1.5px solid var(--color-accent);
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  object-fit: cover;
}

.header-name {
  font-size: var(--text-sm);
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--color-accent);
}

.header-meta {
  margin-left: auto;
  font-size: var(--text-xs);
  color: var(--color-text-faint);
  letter-spacing: 0.04em;
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

.header-meta span { white-space: nowrap; }

@media (max-width: 480px) {
  .header-meta { display: none; }
}

/* ===== MODE BAR ===== */
.mode-bar {
  display: flex;
  gap: var(--space-2);
  padding: var(--space-3) var(--space-6);
  border-bottom: 1px solid var(--color-border);
  flex-shrink: 0;
  overflow-x: auto;
}

.mode-btn {
  padding: var(--space-1) var(--space-3);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  font-size: var(--text-xs);
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--color-text-faint);
  white-space: nowrap;
  transition: all var(--transition-fast);
}

.mode-btn:hover {
  border-color: var(--color-accent-dim);
  color: var(--color-accent-dim);
}

.mode-btn.active {
  border-color: var(--color-accent);
  color: var(--color-accent);
  background: var(--color-accent-glow);
}

/* ===== CHAT OUTPUT ===== */
.chat-output {
  flex: 1;
  overflow-y: auto;
  padding: var(--space-6);
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
  scroll-behavior: smooth;
}

.msg {
  padding: var(--space-3) var(--space-4);
  border-radius: var(--radius-lg);
  font-size: var(--text-sm);
  line-height: 1.65;
  max-width: 85%;
  word-wrap: break-word;
  animation: msg-in 0.25s ease-out;
}

@keyframes msg-in {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.user {
  background: var(--color-surface-2);
  border: 1px solid var(--color-border);
  align-self: flex-end;
  color: var(--color-text);
}

.msg.amy {
  background: var(--color-accent-glow);
  border: 1px solid rgba(0, 229, 204, 0.1);
  align-self: flex-start;
  color: var(--color-accent);
}

.msg.amy pre {
  background: var(--color-surface);
  padding: var(--space-3);
  border-radius: var(--radius-sm);
  margin-top: var(--space-2);
  overflow-x: auto;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  font-size: var(--text-xs);
  color: var(--color-text);
}

.msg.system {
  background: var(--color-system-bg);
  border: 1px solid var(--color-system-border);
  color: var(--color-system);
  font-size: var(--text-xs);
  align-self: center;
  text-align: center;
}

.msg.error {
  background: var(--color-error-bg);
  border: 1px solid var(--color-error-border);
  color: var(--color-error);
  font-size: var(--text-xs);
  align-self: center;
}

.msg .thinking-dots::after {
  content: '';
  animation: dots 1.5s steps(4, end) infinite;
}

@keyframes dots {
  0% { content: ''; }
  25% { content: '.'; }
  50% { content: '..'; }
  75% { content: '...'; }
}

/* ===== INPUT BAR ===== */
.input-bar {
  padding: var(--space-4) var(--space-6);
  border-top: 1px solid var(--color-border);
  display: flex;
  align-items: center;
  gap: var(--space-3);
  flex-shrink: 0;
  background: var(--color-surface);
}

.input-actions {
  display: flex;
  gap: var(--space-2);
  flex-shrink: 0;
}

.action-btn {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--color-text-faint);
  transition: all var(--transition-fast);
  position: relative;
}

.action-btn:hover {
  color: var(--color-accent);
  background: var(--color-accent-glow);
}

.action-btn.active {
  color: var(--color-accent);
  background: var(--color-accent-glow);
}

.action-btn svg {
  width: 18px;
  height: 18px;
}

.action-btn .badge {
  position: absolute;
  top: 2px;
  right: 2px;
  width: 8px;
  height: 8px;
  border-radius: var(--radius-full);
  background: var(--color-accent);
  display: none;
}

.action-btn .badge.visible { display: block; }

.file-input-hidden {
  position: absolute;
  opacity: 0;
  width: 0;
  height: 0;
}

.chat-input {
  flex: 1;
  background: var(--color-surface-2);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-2) var(--space-4);
  font-size: var(--text-sm);
  color: var(--color-text);
  min-height: 36px;
  max-height: 120px;
  resize: none;
  line-height: 1.5;
  overflow-y: auto;
}

.chat-input::placeholder { color: var(--color-text-faint); }

.chat-input:focus {
  outline: none;
  border-color: var(--color-accent);
  box-shadow: 0 0 0 1px var(--color-accent);
}

.send-btn {
  padding: var(--space-2) var(--space-4);
  background: var(--color-accent);
  color: var(--color-bg);
  font-weight: 700;
  font-size: var(--text-xs);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  border-radius: var(--radius-md);
  transition: all var(--transition-fast);
  flex-shrink: 0;
  height: 36px;
}

.send-btn:hover { background: var(--color-accent-dim); }
.send-btn:active { transform: scale(0.96); }
.send-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
  transform: none;
}

/* ===== FILE ATTACHMENT INDICATOR ===== */
.attachment-bar {
  display: none;
  padding: var(--space-2) var(--space-6);
  border-top: 1px solid var(--color-border);
  background: var(--color-surface);
  flex-shrink: 0;
}

.attachment-bar.visible { display: flex; }

.attachment-chip {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-1) var(--space-3);
  background: var(--color-surface-3);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-full);
  font-size: var(--text-xs);
  color: var(--color-text-muted);
}

.attachment-chip svg {
  width: 14px;
  height: 14px;
  color: var(--color-accent);
}

.attachment-remove {
  width: 16px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--color-text-faint);
  border-radius: var(--radius-full);
}

.attachment-remove:hover {
  color: var(--color-text);
  background: var(--color-surface-2);
}

.attachment-remove svg {
  width: 12px;
  height: 12px;
  color: inherit;
}

/* ===== FOOTER ===== */
.app-footer {
  padding: var(--space-2) var(--space-6);
  text-align: center;
  flex-shrink: 0;
  font-size: 0.6875rem;
  color: var(--color-text-faint);
  background: var(--color-surface);
}

.app-footer a {
  color: var(--color-text-faint);
  text-decoration: none;
}

.app-footer a:hover { color: var(--color-text-muted); }

/* ===== RESPONSIVE ===== */
@media (max-width: 480px) {
  .app-header { padding: var(--space-3) var(--space-4); }
  .mode-bar { padding: var(--space-2) var(--space-4); }
  .chat-output { padding: var(--space-4); }
  .input-bar { padding: var(--space-3) var(--space-4); }
  .attachment-bar { padding: var(--space-2) var(--space-4); }
  .msg { max-width: 92%; }
}
</style>
</head>

<body>

  <!-- Header -->
  <header class="app-header">
    <div class="header-identity">
      <div class="status-dot"></div>
      <img src="amy-8bit-avatar.png" alt="Amy" class="avatar-sm" width="32" height="32">
      <span class="header-name">AMY</span>
    </div>
    <div class="header-meta">
      <span>TYPELABS</span>
      <span>&middot;</span>
      <span id="connection-status">READY</span>
    </div>
  </header>

  <!-- Mode Bar -->
  <nav class="mode-bar" aria-label="Operating modes">
    <button class="mode-btn active" data-mode="CHAT">Chat</button>
    <button class="mode-btn" data-mode="BUILD">Build</button>
    <button class="mode-btn" data-mode="EXECUTE">Execute</button>
    <button class="mode-btn" data-mode="MONETIZE">Monetize</button>
  </nav>

  <!-- Chat Output -->
  <div class="chat-output" id="output">
    <div class="msg system">Amy online. Ready to go.</div>
  </div>

  <!-- Attachment Bar -->
  <div class="attachment-bar" id="attachment-bar">
    <div class="attachment-chip">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      <span id="attachment-name"></span>
      <button class="attachment-remove" id="remove-attachment" type="button" aria-label="Remove file">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Input Bar -->
  <div class="input-bar">
    <div class="input-actions">
      <!-- Mic Button -->
      <button class="action-btn" id="mic-btn" type="button" aria-label="Voice input" title="Voice input">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
        </svg>
      </button>
      <!-- File Upload -->
      <button class="action-btn" id="upload-btn" type="button" aria-label="Attach file" title="Attach file">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
        <span class="badge" id="file-badge"></span>
      </button>
      <input type="file" class="file-input-hidden" id="file-input" accept="image/*,.pdf,.doc,.docx,.txt,.csv,.xls,.xlsx,.md,.json,.py,.js">
    </div>

    <textarea
      class="chat-input"
      id="chat-input"
      placeholder="Talk to Amy..."
      rows="1"
      aria-label="Message"
    ></textarea>

    <button class="send-btn" id="send-btn" type="button">Send</button>
  </div>

  <!-- Footer -->
  <footer class="app-footer">
    <a href="https://typelabs.ai" target="_blank" rel="noopener noreferrer">TypeLabs</a>
    &middot;
    <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a>
  </footer>

<script>
// ===== CONFIGURATION =====
const AMY_CONFIG = {
  apiUrl: '/execute',  // Point this at your backend
  // apiUrl: 'http://localhost:8000/execute',  // Local dev
  // apiUrl: 'https://your-api.fly.dev/execute',  // Production
};

// ===== STATE =====
let currentMode = 'CHAT';
let selectedFile = null;
let isProcessing = false;

// ===== ELEMENTS =====
const output = document.getElementById('output');
const chatInput = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');
const micBtn = document.getElementById('mic-btn');
const uploadBtn = document.getElementById('upload-btn');
const fileInput = document.getElementById('file-input');
const fileBadge = document.getElementById('file-badge');
const attachmentBar = document.getElementById('attachment-bar');
const attachmentName = document.getElementById('attachment-name');
const removeAttachment = document.getElementById('remove-attachment');
const connectionStatus = document.getElementById('connection-status');

// ===== MODE SWITCHING =====
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    addMessage(`Mode: ${currentMode}`, 'system');
    chatInput.focus();
  });
});

// ===== MESSAGES =====
function addMessage(text, type) {
  const div = document.createElement('div');
  div.className = `msg ${type}`;

  if (type === 'amy') {
    // Simple formatting: detect code blocks
    const formatted = text
      .replace(/```([\s\S]*?)```/g, '<pre>$1</pre>')
      .replace(/\n/g, '<br>');
    div.innerHTML = formatted;
  } else {
    div.textContent = text;
  }

  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
  return div;
}

function addThinking() {
  const div = document.createElement('div');
  div.className = 'msg amy';
  div.innerHTML = '<span class="thinking-dots">Thinking</span>';
  div.id = 'thinking-msg';
  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
  return div;
}

function removeThinking() {
  const el = document.getElementById('thinking-msg');
  if (el) el.remove();
}

// ===== SEND =====
async function send() {
  const text = chatInput.value.trim();
  if (!text && !selectedFile) return;
  if (isProcessing) return;

  // Show user message
  let displayText = text;
  if (selectedFile) {
    displayText = text ? `${text} [${selectedFile.name}]` : `[${selectedFile.name}]`;
  }
  addMessage(displayText, 'user');

  // Clear input
  chatInput.value = '';
  chatInput.style.height = 'auto';
  clearFile();

  // Show thinking
  isProcessing = true;
  sendBtn.disabled = true;
  const thinking = addThinking();

  try {
    const payload = {
      mode: currentMode,
      input: text || `[File: ${selectedFile ? selectedFile.name : 'none'}]`
    };

    const res = await fetch(AMY_CONFIG.apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    removeThinking();

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();
    const reply = data.result || data.message || data.output || JSON.stringify(data);
    addMessage(reply, 'amy');
    connectionStatus.textContent = 'CONNECTED';

  } catch (err) {
    removeThinking();

    if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError') || err.message.includes('not valid JSON') || err.message.includes('Unexpected token')) {
      addMessage('Backend not connected. Set AMY_CONFIG.apiUrl to your server endpoint.', 'error');
      connectionStatus.textContent = 'OFFLINE';
    } else {
      addMessage(`Error: ${err.message}`, 'error');
    }
  }

  isProcessing = false;
  sendBtn.disabled = false;
  chatInput.focus();
}

sendBtn.addEventListener('click', send);

chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

// Auto-resize textarea
chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
});

// ===== FILE UPLOAD =====
uploadBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', (e) => {
  if (e.target.files.length > 0) {
    selectedFile = e.target.files[0];
    attachmentName.textContent = selectedFile.name;
    attachmentBar.classList.add('visible');
    fileBadge.classList.add('visible');
  }
});

removeAttachment.addEventListener('click', clearFile);

function clearFile() {
  selectedFile = null;
  fileInput.value = '';
  attachmentBar.classList.remove('visible');
  fileBadge.classList.remove('visible');
}

// ===== MIC (placeholder for future WebRTC/Whisper) =====
let micActive = false;
micBtn.addEventListener('click', () => {
  micActive = !micActive;
  micBtn.classList.toggle('active', micActive);

  if (micActive) {
    addMessage('Voice input coming soon. Type for now.', 'system');
    setTimeout(() => {
      micActive = false;
      micBtn.classList.remove('active');
    }, 2000);
  }
});

// ===== DRAG & DROP =====
document.addEventListener('dragover', (e) => e.preventDefault());
document.addEventListener('drop', (e) => {
  e.preventDefault();
  if (e.dataTransfer.files.length > 0) {
    selectedFile = e.dataTransfer.files[0];
    attachmentName.textContent = selectedFile.name;
    attachmentBar.classList.add('visible');
    fileBadge.classList.add('visible');
    chatInput.focus();
  }
});

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown', (e) => {
  // Cmd/Ctrl + 1-4 for mode switching
  if ((e.metaKey || e.ctrlKey) && e.key >= '1' && e.key <= '4') {
    e.preventDefault();
    const modes = ['CHAT', 'BUILD', 'EXECUTE', 'MONETIZE'];
    const idx = parseInt(e.key) - 1;
    document.querySelectorAll('.mode-btn')[idx].click();
  }
});

// Focus input on load
chatInput.focus();
</script>
</body>
</html>
